spring.application.name=smartwatch-service
server.port=8095
server.forward-headers-strategy=framework

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/smartwatch_db
spring.data.mongodb.auto-index-creation=true

spring.main.allow-bean-definition-overriding=true

# Eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.registry-fetch-interval-seconds=5
eureka.instance.prefer-ip-address=true
# Lease tuning – send heartbeats every 5 s, Eureka expires after 15 s of silence.
# This keeps the service stably registered during local development.
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15

# ═══════════════════════════════════════════════════════════
# Kafka Configuration (internal event bus for Heart Beat)
# ═══════════════════════════════════════════════════════════
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=latest

# Topic names
heartrate.topic.raw=heartrate.raw
heartrate.topic.alerts=heartrate.alerts

# ═══════════════════════════════════════════════════════════
# Heart-rate alert detection
# ═══════════════════════════════════════════════════════════
heartrate.alert.cooldown-seconds=60

# Short-lived tokens used by the platform-generated smartwatch config.
# The legacy dev script can still send userId directly to /api/heart-rate/ingest.
heartrate.smartwatch-token.secret=medisync-smartwatch-dev-secret-change-me
heartrate.smartwatch-token.ttl-seconds=600

# ═══════════════════════════════════════════════════════════
# AI prediction pipeline
# ═══════════════════════════════════════════════════════════
heartrate.ai.inference-url=http://localhost:5001/predict
heartrate.ai.backpi-url=http://localhost:8082/api/patients/by-user
heartrate.ai.window-size=60
