spring.application.name=eureka-server
server.port=8761

# Don't register itself as a client
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# ── Local-dev stability ─────────────────────────────────────
# Disable self-preservation so stale leases are evicted promptly.
# (In production you would keep self-preservation ON.)
eureka.server.enable-self-preservation=false
# Run the eviction task every 5 s instead of the default 60 s
eureka.server.eviction-interval-timer-in-ms=5000
