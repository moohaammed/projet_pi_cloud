spring.application.name=education-service
server.port=8086
server.forward-headers-strategy=framework

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/education_db
spring.data.mongodb.auto-index-creation=true

spring.main.allow-bean-definition-overriding=true

# Eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Externalize secrets
spring.config.import=optional:file:secret.properties,optional:file:../../secret.properties

openrouter.api.key=${OPENROUTER_API_KEY}
# Powerful and smart model — best for transcript extraction
openrouter.model=${OPENROUTER_MODEL:google/gemini-2.0-flash-001}
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
# Timeout in seconds for LLM calls (generous for slow networks)
openrouter.timeout.seconds=30

# Gmail SMTP configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mkadi.8706@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
