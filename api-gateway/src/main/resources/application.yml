server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600

      # Remove duplicate CORS headers coming from upstream services
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      routes:

        # ── Collaboration service ──────────────────────────────────────────
        - id: collab-rest
          uri: lb://collab-service
          predicates:
            - Path=/api/messages/**,/api/groups/**,/api/publications/**,/api/comments/**,/api/notifications/**,/api/handover/**,/api/care-relay/**,/api/carebot/**,/api/admin/collaboration/**

        # ── RendezVous service ──────────────────────────────────────────
        - id: rendezvous-rest
          uri: lb://rendezvous-service
          predicates:
            - Path=/api/rendezvous/**

        # ── Geo service ──────────────────────────────────────────────────────
        # Must be declared BEFORE the backpi catch-all (/api/**) so these
        # more-specific paths are matched first by Spring Cloud Gateway.
        - id: geo-service
          uri: lb://geo-service
          predicates:
            - Path=/api/incidents/**,/api/alerts/**,/api/hospitals/**,/api/locations/**,/api/safe-zones/**,/api/patient-locations/**

        - id: geo-service
          uri: lb://geo-service
          predicates:
            - Path=/api/incidents/**,/api/alerts/**,/api/hospitals/**,/api/locations/**,/api/safe-zones/**,/api/safezones/**,/api/patient-locations/**

        # ── Main service (backpi) ──────────────────────────────────────────
        # ── Education service ──────────────────────────────────────────
        - id: education-rest
          uri: lb://education-service
          predicates:
            - Path=/api/activities/**,/api/patient-activity/**,/api/events/**,/api/event-seats/**,/uploads/education/**,/api/audio-sessions/**

        # ── Donation service ──────────────────────────────────────────
        - id: donation-rest
          uri: lb://donation-service
          predicates:
            - Path=/api/donations/**,/api/campaigns/**

        # ── Smartwatch service ──────────────────────────────────────────
        - id: smartwatch-service
          uri: lb://smartwatch-service
          predicates:
            - Path=/api/heart-rate/**

        # ── Main service (backpi) ────────────────────────────────────────
        - id: main-service
          uri: lb://backpi
          predicates:
            - Path=/api/**,/ws/**,/uploads/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true