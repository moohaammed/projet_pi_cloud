<body>

					</div>

		</div>

	<div class="align-items-center d-flex justify-content-center text-center vh-100">
		<!-- Start Home Button --><a href="index.html" class="align-items-center btn btn-home btn-primary d-flex justify-content-center p-0 position-absolute" data-bs-toggle="tooltip" data-bs-placement="right" data-bs-title="Back To Home"><i
        class="fa-solid fa-house"></i></a>
		<!-- /.End Home Button -->
		<div class="container m-auto py-5">
			<div class="row justify-content-center">
				<div class="col-sm-10 col-lg-10">
					<div class="align-items-center g-4 row">
						<div class="col-lg-6 col-xl-5">
							<!-- Start Header Text -->
							<div class="text-center mb-4">
								<h3 class="fw-semibold">Doctor <span
                    class="underline position-relative text-primary">Registration</span></h3>
								<p class="text-muted text-center mb-0">Start your 15-day trial, no credit card required</p>
							</div>
							<!-- /.End Header Text -->
							<form class="register-form row g-4">
								<div class="col-sm-12">
									<!-- Start Form Group (Select) -->
									<div class="form-group">
										<label class="required">Title</label>
										<select name="state" class="form-select">
											<option value="Dr." selected="selected">Dr.</option>
											<option value="Prof. Dr.">Prof. Dr.</option>
											<option value="Assoc. Prof. Dr.">Assoc. Prof. Dr.</option>
											<option value="Asst. Prof. Dr.">Asst. Prof. Dr.</option>
										</select>
									</div>
									<!-- /.End Form Group (Select) -->
								</div>
								<div class="col-sm-6">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">First Name</label>
										<input type="text" class="form-control"> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-6">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">Last Name</label>
										<input type="text" class="form-control"> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-8">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">Date Of Birth</label>
										<input type="date" class="form-control"> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-4">
									<!-- Start Form Group (Select) -->
									<div class="form-group">
										<label class="required">Genter</label>
										<select name="state" class="form-select">
											<option value="Male" selected="selected">Male</option>
											<option value="Female">Female</option>
										</select>
									</div>
									<!-- /.End Form Group (Select) -->
								</div>
								<div class="col-sm-12">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">National ID / Passport Number</label>
										<input type="text" class="form-control"> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-6">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">BMDC Number</label>
										<input type="text" class="form-control"> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-6">
									<!-- Start Form Group (Select) -->
									<div class="form-group">
										<label class="required">Department</label>
										<select name="department" class="form-select">
											<option value="1">Cardiology</option>
											<option value="2">Allergy sex & Immunology</option>
											<option value="3">Laser</option>
											<option value="4">Medicine</option>
											<option value="5">Dentistry</option>
											<option value="6">Orthopaedic</option>
											<option value="7">Neuromedicine</option>
											<option value="8">Cancer (Oncology)</option>
											<option value="9">Gynecology</option>
										</select>
									</div>
									<!-- /.End Form Group (Select) -->
								</div>
								<div class="col-sm-12">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">Mobile Number</label>
										<input type="number" class="form-control"> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-12">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">Enter Email</label>
										<input type="email" class="form-control"> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-6">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">Password</label>
										<input type="password" class="form-control password" autocomplete="off"> <i class="far fa-eye-slash"></i> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-6">
									<!-- Start Form Group -->
									<div class="form-group">
										<label class="required">Confirm Password</label>
										<input type="password" class="form-control c-password" autocomplete="off"> <i class="far fa-eye-slash"></i> </div>
									<!-- /.End Form Group -->
								</div>
								<div class="col-sm-12">
									<!-- Start Checkbox -->
									<div class="form-check text-start">
										<input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
										<label class="form-check-label" for="flexCheckDefault"> By signing up, you agree to the <a href="terms-conditions.html" class="text-decoration-underline">terms of service</a> </label>
									</div>
									<!-- /.End Checkbox -->
								</div>
								<div class="col-sm-12">
									<!-- Start Button -->
									<button type="submit" class="btn btn-primary btn-lg w-100">Sign Up</button>
									<!-- /.End Button -->
								</div>
							</form>
							<!-- Start Bottom Text -->
							<div class="bottom-text text-center mt-3"> Already have an account? <a href="login.html" class="fw-medium text-decoration-underline">Sign
                  In</a> </div>
							<!-- /.End Bottom Text -->
						</div>
						<div class="col-lg-6 col-xl-7 order-lg-first pe-xl-5">
							<!-- Start Illustration Image --><img src="assets/img/illustration/agreement.svg" alt="" class="img-fluid">
							<!-- /.End Illustration Image -->
						</div>
