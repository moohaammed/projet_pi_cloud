<main class="location-capture">
  <section class="camera-panel">
    <div class="camera-frame">
      <video #video autoplay muted playsinline></video>
      <canvas #canvas aria-hidden="true"></canvas>
      <div class="scan-line" *ngIf="cameraReady"></div>
    </div>

    <div class="status-card" *ngIf="result" [class.unknown]="isUnknown" [class.known]="!isUnknown">
      <ng-container *ngIf="!isUnknown; else unknownLocation">
        <strong>You are at: {{ result.lieu }} ({{ result.confiance }})</strong>
      </ng-container>
      <ng-template #unknownLocation>
        <strong *ngIf="result.incidentId">Unknown location - alert sent to your family</strong>
        <strong *ngIf="!result.incidentId">Unknown location - no red-zone alert detected</strong>
      </ng-template>
      <span *ngIf="lastCaptureAt">Last analysis: {{ lastCaptureAt | date:'HH:mm:ss' }}</span>
    </div>

    <div class="waiting-card" *ngIf="!result && !errorMessage">
      <strong>AlzCare monitoring enabled</strong>
      <span>The camera analyzes the environment every 30 seconds.</span>
    </div>

    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
  </section>
</main>
