<div
  class="sed-backdrop"
  *ngIf="open && event"
  (click)="close()"
  role="dialog"
  aria-modal="true"
  aria-labelledby="sed-title"
>
  <div class="sed-card" (click)="$event.stopPropagation()">
    <div class="card-header d-flex justify-content-between align-items-start">
      <div class="d-flex align-items-center">
        <div class="sed-title-icon">
          <i class="fa-solid fa-share-nodes"></i>
        </div>
        <div>
          <h2 id="sed-title" class="h5 fw-bold mb-1 text-dark">Share to Feed</h2>
          <p class="text-muted mb-0" style="font-size: 0.8125rem;">Post an event card to the collaboration feed</p>
        </div>
      </div>
      <button type="button" class="sed-btn-close" (click)="close()" aria-label="Close">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="card-body">
      <div class="sed-event-preview mb-3">
        <div class="d-flex align-items-start">
          <div class="sed-event-icon">
            <i class="fa-regular fa-calendar-check"></i>
          </div>
          <div class="flex-grow-1" style="min-width: 0;">
            <div class="fw-semibold text-dark text-truncate" style="font-size: 0.9375rem;">{{ event.title }}</div>
            <div class="d-flex flex-wrap gap-3 mt-1">
              <div class="sed-event-meta" *ngIf="event.startDateTime">
                <i class="fa-regular fa-clock"></i>
                <span>{{ event.startDateTime | date : 'medium' }}</span>
              </div>
              <div class="sed-event-meta" *ngIf="event.location">
                <i class="fa-solid fa-location-dot"></i>
                <span class="text-truncate">{{ event.location }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <label class="sed-textarea-label">
        <i class="fa-regular fa-comment-dots"></i>
        Add a note <span class="text-muted fw-normal">(optional)</span>
      </label>
      <textarea
        class="form-control sed-textarea w-100"
        rows="3"
        [(ngModel)]="note"
        placeholder="Why you're sharing this, or any extra details..."
        [disabled]="submitting() || success()"
      ></textarea>

      <div class="sed-alert sed-alert-danger mt-3" *ngIf="error()">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error() }}</span>
      </div>
      <div class="sed-alert sed-alert-success mt-3" *ngIf="success()">
        <i class="fa-solid fa-circle-check"></i>
        <span>Published! You can <a routerLink="/collaboration/feed" (click)="close()">view the feed</a> to see it.</span>
      </div>
    </div>

    <div class="card-footer d-flex justify-content-end gap-2">
      <button type="button" class="sed-btn-secondary" (click)="close()" [disabled]="submitting()">
        {{ success() ? 'Close' : 'Cancel' }}
      </button>
      <button
        type="button"
        class="sed-btn-primary"
        (click)="submit()"
        [disabled]="submitting() || success() || !(event.title ?? '').trim()"
      >
        <span class="sed-spinner" *ngIf="submitting()"></span>
        <i class="fa-solid fa-paper-plane" *ngIf="!submitting()"></i>
        <span>Post to feed</span>
      </button>
    </div>
  </div>
</div>
