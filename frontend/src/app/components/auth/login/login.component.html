<div class="align-items-center d-flex justify-content-center vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <h3 class="fw-semibold">Connexion à votre
                <span class="text-primary">compte</span>
              </h3>
              <p class="text-muted">Bienvenue sur AlzCare</p>
            </div>

            <div *ngIf="error" class="alert alert-danger py-2">
              <i class="fa-solid fa-circle-exclamation me-2"></i>{{ error }}
            </div>

            <div class="mb-3">
              <label class="form-label fw-medium">Email</label>
              <input type="email" class="form-control"
                     placeholder="votre@email.com"
                     [(ngModel)]="credentials.email" name="email">
            </div>

            <div class="mb-3 position-relative">
              <label class="form-label fw-medium">Mot de passe</label>
              <input [type]="showPassword ? 'text' : 'password'"
                     class="form-control" placeholder="••••••••"
                     [(ngModel)]="credentials.password" name="password">
              <i class="far position-absolute"
                 [class.fa-eye]="showPassword"
                 [class.fa-eye-slash]="!showPassword"
                 (click)="togglePassword()"
                 style="right:12px; top:38px; cursor:pointer; color:#888"></i>
            </div>

            <button class="btn btn-primary btn-lg w-100 mt-2"
                    (click)="login()" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              <i *ngIf="!loading" class="fa-solid fa-right-to-bracket me-2"></i>
              {{ loading ? 'Connexion...' : 'Se connecter' }}
            </button>

            <div class="text-center mt-3">
              Pas de compte ?
              <a routerLink="/auth/register" class="text-primary fw-medium">
                S'inscrire
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
