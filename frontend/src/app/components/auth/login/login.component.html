<div class="align-items-center d-flex justify-content-center vh-100 bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-5">
            
            <!-- ====== VIEW: LOGIN FORM ====== -->
            <div [hidden]="view !== 'login'">
              <div class="text-center mb-4">
                <h3 class="fw-semibold">Login to your
                  <span class="text-primary">account</span>
                </h3>
                <p class="text-muted">Welcome to AlzCare</p>
              </div>

              <!-- Real Google Auth Button Placeholder -->
              <div class="d-flex justify-content-center mb-4">
                <div id="googleBtnContainer"></div>
              </div>

              <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1 opacity-25">
                <span class="mx-2 text-muted small px-2">or with your email</span>
                <hr class="flex-grow-1 opacity-25">
              </div>

              <div *ngIf="error" class="alert alert-danger py-2 border-0 shadow-sm rounded-3">
                <i class="fa-solid fa-circle-exclamation me-2"></i>{{ error }}
              </div>

              <div class="mb-3">
                <label class="form-label fw-medium">Email Address</label>
                <input type="email" class="form-control bg-light border-0"
                       placeholder="your@email.com"
                       [(ngModel)]="credentials.email" name="email">
              </div>

              <div class="mb-3 position-relative">
                <div class="d-flex justify-content-between">
                  <label class="form-label fw-medium">Password</label>
                  <a href="javascript:void(0)" class="text-primary small fw-semibold text-decoration-none" (click)="showForgotForm()">Forgot password?</a>
                </div>
                <input [type]="showPassword ? 'text' : 'password'"
                       class="form-control bg-light border-0" placeholder="••••••••"
                       [(ngModel)]="credentials.password" name="password">
                <i class="far position-absolute"
                   [class.fa-eye]="showPassword"
                   [class.fa-eye-slash]="!showPassword"
                   (click)="togglePassword()"
                   style="right:12px; top:38px; cursor:pointer; color:#888"></i>
              </div>

              <!-- REAL GOOGLE RECAPTCHA V2 (Test Key) -->
              <div class="d-flex justify-content-center mb-4">
                <div #recaptchaContainer></div>
              </div>

              <button class="btn btn-primary btn-lg w-100 mt-2 rounded-pill shadow-sm"
                      (click)="login()" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                <i *ngIf="!loading" class="fa-solid fa-right-to-bracket me-2"></i>
                {{ loading ? 'Connecting...' : 'Login' }}
              </button>

              <div class="text-center mt-4 text-muted">
                Don't have an account yet?
                <a routerLink="/auth/register" class="text-primary fw-bold text-decoration-none">
                  Sign up here
                </a>
              </div>
            </div>

            <!-- ====== VIEW: FORGOT PASSWORD ====== -->
            <div [hidden]="view !== 'forgot'">
              <div class="text-center mb-4">
                <div class="bg-soft-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                  <i class="fa-solid fa-key fs-1 text-primary"></i>
                </div>
                <h3 class="fw-semibold">Forgot Password?</h3>
                <p class="text-muted small px-3">Enter the email address associated with your account, and we'll send you a reset link.</p>
              </div>

              <div *ngIf="error" class="alert alert-danger py-2 border-0 shadow-sm rounded-3">
                <i class="fa-solid fa-circle-exclamation me-2"></i>{{ error }}
              </div>
              <div *ngIf="success" class="alert alert-success py-2 border-0 shadow-sm rounded-3">
                <i class="fa-solid fa-circle-check me-2"></i>{{ success }}
              </div>

              <div class="mb-4">
                <label class="form-label fw-medium">Email Address</label>
                <input type="email" class="form-control bg-light border-0"
                       placeholder="your@email.com"
                       [(ngModel)]="credentials.email" name="email">
              </div>

              <button class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm mb-3"
                      (click)="requestReset()" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                <i *ngIf="!loading" class="fa-solid fa-paper-plane me-2"></i>
                {{ loading ? 'Sending...' : 'Send Link' }}
              </button>

              <div class="text-center">
                <a href="javascript:void(0)" class="text-muted fw-medium text-decoration-none" (click)="backToLogin()">
                  <i class="fa-solid fa-arrow-left me-1"></i> Back to login
                </a>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
