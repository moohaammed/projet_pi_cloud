<div class="video-call-overlay">
  <div class="video-call-container shadow-2xl">
    <div class="main-video-area">
      <!-- Remote Video (Big) -->
      <video #remoteVideo autoplay playsinline class="remote-video"></video>
      <div class="status-badge" *ngIf="connectionStatus">{{ connectionStatus }}</div>
      
      <!-- Local Video (Picture in Picture) -->
      <div class="local-video-container shadow-lg">
        <video #localVideo autoplay playsinline muted class="local-video"></video>
      </div>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar d-flex justify-content-center align-items-center gap-4">
      <button class="btn btn-control" [class.btn-danger]="isMuted" (click)="toggleMute()">
        <i class="fa-solid" [class.fa-microphone]="!isMuted" [class.fa-microphone-slash]="isMuted"></i>
      </button>

      <button class="btn btn-control" [class.btn-danger]="isVideoOff" (click)="toggleVideo()">
        <i class="fa-solid" [class.fa-video]="!isVideoOff" [class.fa-video-slash]="isVideoOff"></i>
      </button>

      <button class="btn btn-primary btn-call-start" (click)="startCall()">
        <i class="fa-solid fa-phone-volume me-2"></i> Démarrer l'Appel
      </button>

      <button class="btn btn-danger btn-hangup" (click)="hangup()">
        <i class="fa-solid fa-phone-slash me-2"></i> Raccrocher
      </button>
    </div>
  </div>
</div>
