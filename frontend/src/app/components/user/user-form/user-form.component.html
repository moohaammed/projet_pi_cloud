<div class="row mb-5 animate-fade-in">
  <div class="col-12 text-center text-lg-start">
    <div class="section-header mb-4">
      <h2 class="fw-bold mb-1 text-capitalize fs-28">
        {{ isEdit ? 'Modifier' : 'Créer' }} <span class="underline position-relative text-primary">Utilisateur</span>
      </h2>
      <div class="sub-title fs-15 text-muted">Ajustez les permissions, les rôles et la sécurité du compte des membres de la plateforme.</div>
    </div>
  </div>
</div>

<div class="row animate-fade-in">
  <div class="col-lg-12">
    <div class="card border-0 shadow rounded-4 overflow-hidden bg-white">
      <div class="card-header bg-soft-primary border-0 p-4">
        <div class="d-flex align-items-center gap-3">
          <div class="bg-white text-primary rounded-circle shadow-sm icon-wrapper-50">
            <i class="fa-solid fa-user-gear fs-4"></i>
          </div>
          <div>
            <h5 class="fw-bold text-primary mb-0">Identité du Compte</h5>
            <p class="text-primary small opacity-75 mb-0">Définissez les accès et le niveau de permissions de cet utilisateur.</p>
          </div>
        </div>
      </div>

      <div class="card-body p-4 p-lg-5">
        <form (ngSubmit)="save()" #uForm="ngForm" class="row g-4">

          <div class="col-md-6">
            <label class="form-label">Prénom <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="prenom" [(ngModel)]="user.prenom" required
              placeholder="Prénom">
          </div>

          <div class="col-md-6">
            <label class="form-label">Nom <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="nom" [(ngModel)]="user.nom" required placeholder="Nom">
          </div>

          <div class="col-md-12">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control" name="email" [(ngModel)]="user.email" required
              placeholder="votre&#64;email.com">
          </div>

          <div class="col-md-6" *ngIf="!isEdit">
            <label class="form-label">Mot de passe <span class="text-danger">*</span></label>
            <input type="password" class="form-control" name="password" [(ngModel)]="user.password" required
              placeholder="••••••••">
          </div>

          <div class="col-md-6">
            <label class="form-label">Téléphone</label>
            <input type="tel" class="form-control" name="tel" [(ngModel)]="user.telephone"
              placeholder="+216 -- --- ---">
          </div>

          <div class="col-md-6">
            <label class="form-label">Rôle Système <span class="text-danger">*</span></label>
            <select class="form-select" name="role" [(ngModel)]="user.role" required>
              <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
            </select>
          </div>

          <div class="col-md-6 d-flex align-items-end">
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" id="userActif" name="actif" [(ngModel)]="user.actif">
              <label class="form-check-label fw-bold small ms-2" for="userActif">Compte Actif</label>
            </div>
          </div>

          <div class="col-12 mt-5 pt-4 border-top">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
              <div class="text-danger small fw-bold" *ngIf="error">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ error }}
              </div>
              <div class="d-flex gap-3 w-100 w-md-auto ms-auto">
                <button type="button" class="btn btn-white border px-4 py-2 rounded-3 fw-bold" (click)="cancel()">
                  Annuler
                </button>
                <button type="submit" class="btn btn-primary px-5 py-2 rounded-3 fw-bold shadow-sm"
                  [disabled]="!uForm.valid || loading">
                  <span *ngIf="!loading">{{ isEdit ? 'Mettre à jour' : 'Créer le compte' }}</span>
                  <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status"></span>
                </button>
              </div>
            </div>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
