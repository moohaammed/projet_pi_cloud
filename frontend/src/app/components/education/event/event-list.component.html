<div class="container mt-4">

  <!-- Formulaire -->
  <div class="card mb-4">
    <div class="card-header fw-bold">
      {{ isEditing ? 'Modifier l\'événement' : 'Nouvel événement' }}
    </div>
    <div class="card-body">
      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Titre *</label>
          <input class="form-control" [(ngModel)]="newEvent.title"
                 placeholder="ex : Séance du matin, Visite famille">
        </div>

        <div class="col-md-6">
          <label class="form-label">Date et heure *</label>
          <input class="form-control" type="datetime-local"
                 [(ngModel)]="newEvent.startDateTime">
        </div>

        <div class="col-md-6">
          <label class="form-label">Lieu</label>
          <input class="form-control" [(ngModel)]="newEvent.location"
                 placeholder="ex : Domicile, EHPAD, Cabinet...">
        </div>

        <div class="col-md-3">
          <label class="form-label">Patient (userId)</label>
          <input class="form-control" type="number"
                 [(ngModel)]="newEvent.userId">
        </div>

        <div class="col-md-3 d-flex align-items-end pb-2">
          <div class="form-check">
            <input class="form-check-input" type="checkbox"
                   [(ngModel)]="newEvent.remindEnabled" id="remind">
            <label class="form-check-label" for="remind">
              Rappel activé
            </label>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Image</label>
          <input class="form-control" type="file" (change)="onFileSelected($event)">
        </div>

      </div>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary" (click)="save()">
          {{ isEditing ? 'Sauvegarder' : 'Créer l\'événement' }}
        </button>
        <button class="btn btn-secondary" (click)="reset()" *ngIf="isEditing">
          Annuler
        </button>
      </div>
    </div>
  </div>

  <!-- Liste -->
  <div class="card">
    <div class="card-header fw-bold">Liste des événements</div>
    <div class="card-body p-0">
      <table class="table table-bordered table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Date</th>
            <th>Lieu</th>
            <th>Image</th>
            <th>Rappel</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of events">
            <td>{{ e.id }}</td>
            <td>{{ e.title }}</td>
            <td>{{ e.startDateTime | date:'dd/MM/yyyy HH:mm' }}</td>
            <td>{{ e.location }}</td>
            <td>
              <img *ngIf="e.imageUrl" [src]="getImageUrl(e.imageUrl)" alt="Event" width="48" height="48" style="object-fit:cover; border-radius:4px;">
            </td>
            <td>
              <span class="badge"
                    [class.bg-success]="e.remindEnabled"
                    [class.bg-secondary]="!e.remindEnabled">
                {{ e.remindEnabled ? 'Oui' : 'Non' }}
              </span>
            </td>
            <td>
              <button class="btn btn-sm btn-warning me-1"
                      (click)="edit(e)">Modifier</button>
              <button class="btn btn-sm btn-danger"
                      (click)="delete(e.id!)">Supprimer</button>
            </td>
          </tr>
          <tr *ngIf="events.length === 0">
            <td colspan="7" class="text-center text-muted py-3">
              Aucun événement pour l'instant
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
