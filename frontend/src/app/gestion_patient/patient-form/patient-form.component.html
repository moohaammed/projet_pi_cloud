<div class="card border-0 shadow-sm">

  <!-- Card Header -->
  <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
    <h5 class="fw-bold mb-0">
      <i class="fa-solid fa-user-plus me-2 text-primary"></i>
      Nouveau Patient
    </h5>
    <p class="text-muted small mt-1 mb-3">Renseignez les informations du dossier médical</p>
    <hr class="mt-0">
  </div>

  <!-- Card Body -->
  <div class="card-body px-4 pb-4 pt-2">
    <form [formGroup]="patientForm" (ngSubmit)="onSubmit()">

      <!-- Nom -->
      <div class="form-group mt-4">
        <input id="pf-nom"
               type="text"
               class="form-control"
               formControlName="nom"
               placeholder="Ex : Dupont"
               [ngClass]="{'is-invalid': patientForm.get('nom')?.invalid && patientForm.get('nom')?.touched}">
        <label for="pf-nom" class="required">Nom de famille</label>
        <div class="invalid-feedback">Le nom est requis.</div>
      </div>

      <!-- Prénom -->
      <div class="form-group mt-4">
        <input id="pf-prenom"
               type="text"
               class="form-control"
               formControlName="prenom"
               placeholder="Ex : Jean"
               [ngClass]="{'is-invalid': patientForm.get('prenom')?.invalid && patientForm.get('prenom')?.touched}">
        <label for="pf-prenom" class="required">Prénom</label>
        <div class="invalid-feedback">Le prénom est requis.</div>
      </div>

      <!-- Âge + Poids -->
      <div class="row g-3 mt-0">
        <div class="col-6">
          <div class="form-group mt-4">
            <input id="pf-age"
                   type="number"
                   class="form-control"
                   formControlName="age"
                   placeholder="45"
                   [ngClass]="{'is-invalid': patientForm.get('age')?.invalid && patientForm.get('age')?.touched}">
            <label for="pf-age" class="required">Âge</label>
            <div class="invalid-feedback">Âge invalide.</div>
          </div>
        </div>
        <div class="col-6">
          <div class="form-group mt-4">
            <input id="pf-poids"
                   type="number"
                   class="form-control"
                   formControlName="poids"
                   placeholder="75"
                   [ngClass]="{'is-invalid': patientForm.get('poids')?.invalid && patientForm.get('poids')?.touched}">
            <label for="pf-poids" class="required">Poids (kg)</label>
            <div class="invalid-feedback">Poids invalide.</div>
          </div>
        </div>
      </div>

      <!-- Sexe -->
      <div class="form-group mt-4">
        <select id="pf-sexe" class="form-select" formControlName="sexe">
          <option value="Homme">Homme</option>
          <option value="Femme">Femme</option>
        </select>
        <label for="pf-sexe">Sexe</label>
      </div>

      <!-- IRM Upload Zone -->
      <div class="mt-4">
        <p class="small fw-bold text-uppercase text-muted mb-2" style="letter-spacing:.05em">
          <i class="fa-solid fa-brain me-1 text-primary"></i>
          Scanner IRM (optionnel)
        </p>

        <div class="drop-zone"
             [class.drop-zone--active]="dragOver"
             [class.drop-zone--selected]="selectedFile"
             (dragover)="onDragOver($event)"
             (dragleave)="onDragLeave($event)"
             (drop)="onDrop($event)">

          <input type="file" id="pf-irm" #fileInput hidden
                 (change)="onFileSelected($event)"
                 accept=".dcm,.png,.jpg,.jpeg">

          <!-- Drop prompt -->
          <div *ngIf="!selectedFile" class="drop-zone__prompt" (click)="fileInput.click()">
            <i class="fa-solid fa-cloud-arrow-up fa-2x text-muted mb-2"></i>
            <p class="mb-1 small">
              <strong class="text-primary">Cliquez</strong> ou glissez l'IRM ici
            </p>
            <small class="text-muted">DCM, PNG, JPG acceptés</small>
          </div>

          <!-- File selected info -->
          <div *ngIf="selectedFile" class="drop-zone__file">
            <i class="fa-solid fa-file-medical fa-lg text-primary flex-shrink-0"></i>
            <div class="flex-grow-1 overflow-hidden">
              <p class="mb-0 fw-semibold text-truncate small">{{ selectedFile.name }}</p>
              <small class="text-muted">{{ (selectedFile.size / 1024 / 1024).toFixed(2) }} MB</small>
            </div>
            <button type="button"
                    class="btn btn-sm btn-outline-danger flex-shrink-0"
                    (click)="selectedFile = null; $event.stopPropagation()">
              <i class="fa-solid fa-times"></i>
            </button>
          </div>

        </div>
      </div>

      <!-- Submit -->
      <div class="d-grid mt-4">
        <button id="btn-submit-patient"
                type="submit"
                class="btn btn-primary"
                [disabled]="patientForm.invalid || isSubmitting">
          <span *ngIf="!isSubmitting">
            <i class="fa-solid fa-save me-2"></i>Enregistrer le patient
          </span>
          <span *ngIf="isSubmitting">
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Enregistrement...
          </span>
        </button>
      </div>

    </form>
  </div>
</div>
