# Configuration commune
spring.application.name=backpi


spring.datasource.url=jdbc:mysql://localhost:3306/alzheimer_db?serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.main.allow-bean-definition-overriding=true

server.port=8082
server.forward-headers-strategy=framework

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Externalize secrets (add secret.properties to your local root or resources)
spring.config.import=optional:file:secret.properties,optional:file:../../secret.properties

# Hugging Face
huggingface.api.url=https://router.huggingface.co/models/cardiffnlp/twitter-roberta-base-sentiment-latest
huggingface.api.token=${HF_TOKEN:}
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.model=${OPENROUTER_MODEL:openrouter/free}
# Google Gemini AI
spring.ai.google.gemini.model-id=gemini-3-flash-preview
spring.ai.google.gemini.api-key=${GEMINI_KEY:}
# Gmail SMTP configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mkadi.8706@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Stripe Configuration
stripe.api.key=${STRIPE_API_KEY}
frontend.url=http://localhost:4200

# Eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
