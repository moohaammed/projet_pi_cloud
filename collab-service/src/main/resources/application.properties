spring.application.name=collab-service
# MANDATORY: URL for backpi user service to resolve names (User N bug)
backpi.base.url=http://localhost:8082

server.port=8081
app.upload.dir=uploads/media
server.forward-headers-strategy=framework

# MongoDB (Using Localhost to match your data in Compass)
spring.data.mongodb.uri=mongodb://localhost:27017/collab_db
# Atlas URI: mongodb+srv://yosr:yosr@cluster0.a5ojkea.mongodb.net/collab_db?retryWrites=true&w=majority&appName=Cluster0
